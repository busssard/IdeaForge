services:
  postgres:
    image: postgres:16-alpine
    container_name: ideaforge-db
    environment:
      POSTGRES_USER: ideaforge
      POSTGRES_PASSWORD: ideaforge
      POSTGRES_DB: ideaforge
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ideaforge"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
